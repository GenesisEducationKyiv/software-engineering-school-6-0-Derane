services:
  app:
    environment:
      - RUN_MIGRATIONS_ON_BOOT=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  playwright:
    image: mcr.microsoft.com/playwright:v1.49.1-noble
    working_dir: /e2e
    volumes:
      - ./tests/e2e:/e2e
    environment:
      - E2E_BASE_URL=http://app:8080
      - CI=true
    depends_on:
      app:
        condition: service_healthy
    profiles: ["e2e"]
    command:
      - sh
      - -c
      - "npm ci --no-audit --no-fund --no-progress && npx playwright test"
