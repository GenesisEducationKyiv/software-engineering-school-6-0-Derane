name: Lint & Static Analysis

on:
  push:
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: PHP_CodeSniffer & Psalm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run PHP_CodeSniffer
        run: make lint

      - name: Run Psalm
        run: make psalm
