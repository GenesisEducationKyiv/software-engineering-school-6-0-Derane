name: Acceptance Tests

on:
  push:
  pull_request:

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  behat:
    name: Behat (HTTP contract)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker stack
        run: make acceptance-up

      - name: Run Behat suite
        run: make acceptance-run
