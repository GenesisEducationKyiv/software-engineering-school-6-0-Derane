name: PHP CI

on:
  push:
  pull_request:

jobs:
  code-quality:
    name: Code Quality (Lint & Static Analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PHP_CodeSniffer
        run: make lint

      - name: Run PHPStan
        run: make stan

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: make test

  acceptance-tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    needs: [ code-quality, unit-tests ]
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: make behat-up

      - name: Run Behat acceptance tests
        run: make behat-run
